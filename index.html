    /* [TAG: CSS_STYLES] - Estilos Core y Animaciones */
    .no-select { user-select: none; }

    .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 4px; }

    /* [UPDATE] Refinamiento de contraste y legibilidad (WCAG) */
.celda-calendario {
    transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
}

/* Indicadores de TD en la esquina (Círculos con stroke) */
.td-dot {
    width: 7px;
    height: 7px;
    border-radius: 9999px;
    border: 1px solid rgba(0, 0, 0, 0.4); /* Stroke oscuro para contraste en fondos claros */
    box-shadow: 0 1px 2px rgba(0, 0, 0, 0.1);
}

/* Estado de Selección (Halo de contraste) */
.celda-calendario.seleccionada {
    outline: 3px solid #4f46e5; /* Indigo 600 */
    outline-offset: 1px;
    z-index: 20;
    transform: scale(1.05);
    box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.2);
}

/* Tipografía de contraste dinámico */
.text-contraste-dark { color: #1e293b; text-shadow: 0 1px 0 rgba(255,255,255,0.4); }
.text-contraste-light { color: #ffffff; text-shadow: 0 1px 2px rgba(0,0,0,0.3); }

  <script>

    window.cerrarSesion = function() {
    sessionStorage.removeItem('eor_session_token');
    sessionStorage.removeItem('eor_session_role');
    const wall = document.getElementById('login-wall');
    wall.classList.remove('hidden');
    void wall.offsetWidth; 
    wall.classList.remove('opacity-0', 'pointer-events-none');
    const passInput = document.getElementById('login-pass');
    if(passInput) passInput.value = '';
    window.datosGlobales = [];
    document.getElementById('dashboard').innerHTML = '';
    showToast("Sesión cerrada correctamente.", "success");
};


window.procesarLogin = function() {
    const user = document.getElementById('login-user').value.trim();
    const pass = document.getElementById('login-pass').value.trim();
    const btn = document.getElementById('btn-login');
    const errorBox = document.getElementById('login-error');
    
    if (!user || !pass) {
        errorBox.innerText = "Complete ambos campos.";
        errorBox.classList.remove('hidden');
        return;
    }

    // Feedback visual
    btn.innerHTML = `<span class="animate-spin inline-block w-4 h-4 border-2 border-white border-t-transparent rounded-full"></span> Validando...`;
    btn.disabled = true;
    errorBox.classList.add('hidden');

    // PATRÓN HÍBRIDO: Determinar entorno de ejecución
    if (typeof google !== 'undefined' && google.script && google.script.run) {
        
        // --- 1. ENTORNO NATIVO (App Script /exec) ---
        google.script.run
            .withSuccessHandler(function(res) {
                if (res.success) {
                    sessionStorage.setItem('eor_session_token', res.token);
                    sessionStorage.setItem('eor_session_role', res.rol);
                    localStorage.setItem('usuarioActivo', user); 
                    desbloquearSistema();
                } else {
                    errorBox.innerText = res.error || "Credenciales incorrectas.";
                    errorBox.classList.remove('hidden');
                }
                btn.innerHTML = "Ingresar al Sistema";
                btn.disabled = false;
            })
            .withFailureHandler(function(err) {
                errorBox.innerText = "Error de red. Intente nuevamente.";
                errorBox.classList.remove('hidden');
                btn.innerHTML = "Ingresar al Sistema";
                btn.disabled = false;
            })
            .validarLogin(user, pass);
            
    } else {
        
        // --- 2. ENTORNO EXTERNO (Render, Vercel, Localhost) ---
        fetch(API_URL, {
            method: 'POST',
            headers: {
                "Content-Type": "text/plain;charset=utf-8" 
            },
            body: JSON.stringify({ action: 'login', usuario: user, password: pass })
        })
        .then(res => res.json())
        .then(res => {
            if (res.success) {
                sessionStorage.setItem('eor_session_token', res.token);
                sessionStorage.setItem('eor_session_role', res.rol);
                localStorage.setItem('usuarioActivo', user); 
                desbloquearSistema();
            } else {
                errorBox.innerText = res.error || "Acceso denegado.";
                errorBox.classList.remove('hidden');
            }
        })
        .catch(err => {
            errorBox.innerText = "Error de red. Intente nuevamente.";
            errorBox.classList.remove('hidden');
            console.error("Error en Fetch Login:", err);
        })
        .finally(() => {
            btn.innerHTML = "Ingresar al Sistema";
            btn.disabled = false;
        });
    }
}

window.sincronizarBackend = function() {
    const btn = document.getElementById('btn-sync-global');
    const icon = document.getElementById('icon-sync-global');
    const text = document.getElementById('text-sync-global');
    btn.disabled = true;
    btn.classList.add('bg-gray-100', 'text-gray-400', 'cursor-not-allowed', 'border-gray-200');
    btn.classList.remove('bg-white', 'text-primary', 'border-blue-200', 'hover:bg-blue-50');
    icon.classList.add('animate-spin', 'text-gray-400');
    icon.classList.remove('text-blue-500');
    if (text) text.innerText = "PROCESANDO...";
    mostrarCargando(true); 

    fetch(API_URL, {
        method: 'POST',
        body: JSON.stringify({ action: 'sincronizarTotal' })
    })
    .then(res => res.json())
    .then(res => {
        if(res.success) {
            showToast("Base de datos sincronizada exitosamente.", "success");
            cargarDatosDesdeCache(); 
        } else {
            showToast(res.error || "Error al sincronizar en el servidor.", "error");
            mostrarCargando(false);
        }
    })
    .catch(err => {
        showToast("Error de red intentando sincronizar: " + err.message, "error");
        mostrarCargando(false);
    })
    .finally(() => {
        btn.disabled = false;
        btn.classList.remove('bg-gray-100', 'text-gray-400', 'cursor-not-allowed', 'border-gray-200');
        btn.classList.add('bg-white', 'text-primary', 'border-blue-200', 'hover:bg-blue-50');
        icon.classList.remove('animate-spin', 'text-gray-400');
        icon.classList.add('text-blue-500');
        if (text) text.innerText = "SYNC BD";
    });
};

function verificarSesion() {
    const token = sessionStorage.getItem('eor_session_token');
    if (!token) {
        document.getElementById('login-wall').classList.remove('hidden');
    } else {
        desbloquearSistema();
    }
}

function desbloquearSistema() {
    const wall = document.getElementById('login-wall');
    wall.classList.add('opacity-0', 'pointer-events-none');
    
    setTimeout(() => {
        wall.classList.add('hidden');
    }, 500);

    cargarDatosDesdeCache(); 
   
}

document.addEventListener('click', (e) => {
    // 1. Cerrar dropdown de búsqueda individual
    const containerSelect = document.getElementById('custom-select-container');
    if (containerSelect && !containerSelect.contains(e.target)) {
        const dropInd = document.getElementById('dropdown-individual');
        if(dropInd) dropInd.classList.add('hidden');
    }

    // 2. Deshacer selección del calendario al hacer clic fuera
    const panelAcciones = document.getElementById('panel-acciones-rango');
    
    if (panelAcciones && !panelAcciones.classList.contains('hidden')) {
        const clicEnPanel = panelAcciones.contains(e.target);
        const clicEnCelda = e.target.closest('.celda-calendario');
        const clicEnZoom = e.target.closest('button') &&

    window.parseFechaObs = function(fechaStr) {
        if (!fechaStr || fechaStr === '-') return null;
        const partes = fechaStr.trim().split(' ');
        if (partes.length !== 3) return null;
        const dia = partes[0].padStart(2, '0');
        const mesStr = partes[1].toLowerCase();
        const anio = partes[2];
        const mesesAbrevLower = ["ene", "feb", "mar", "abr", "may", "jun", "jul", "ago", "sep", "oct", "nov", "dic"];
        const mesIdx = mesesAbrevLower.indexOf(mesStr.substring(0,3));
        if (mesIdx === -1) return null;
        const mes = String(mesIdx + 1).padStart(2, '0');
        return `${anio}-${mes}-${dia}`;
    };

    function formatIsoShort(dateObj) { return dateObj ? dateObj.toISOString().split('T')[0] : null; }
    
    function getBaseState(val) {
        if (val === undefined || val === null) return '';
        let str = String(val).trim().toUpperCase();
        if (str.includes('+')) {
            return str.split('+')[0].trim();
        }
        return str;
    }

    function esInactivo(val) { 
        let base = getBaseState(val);
        return base !== '' && isNaN(base) && base !== 'O' && base !== 'OPERATIVO'; 
    }

    function getTabNameFromDate(dateObj) { return `${mesesAbrev[dateObj.getMonth()]}-${String(dateObj.getFullYear()).slice(-2)}`; }

    window.evaluarEstadoDoc = function(venStr, fBaseObj) {
        if(!venStr || venStr === '-' || venStr === '') return 'VIGENTE'; 
        let vDate = new Date(venStr + "T12:00:00");
        if(isNaN(vDate.getTime())) return 'VIGENTE';
        let diff = (vDate - fBaseObj) / (1000 * 60 * 60 * 24);
        if(diff < 0) return 'VENCIDO';
        if(diff <= 30) return 'POR_VENCER';
        return 'VIGENTE';
    };

    function getValDiaGlobal(diasObj, dateObj) {
        if (!diasObj) return '';
        let strDias = diasObj[getTabNameFromDate(dateObj)];
        if (!strDias) return ''; 
        let arr = typeof strDias === 'string' ? strDias.split(',') : strDias;
        let idx = dateObj.getDate() - 1;
        if (idx < 0 || idx >= arr.length) return '';
        let val = arr[idx];
        if (val === undefined || val === null) return '';
        let str = String(val).trim().toUpperCase();
        return (str === 'UNDEFINED' || str === 'NULL' || str === '-') ? '' : str;
    }

    function calcularRetorno(diasObj, fechaBaseStr) {
        let fBase = new Date(fechaBaseStr + "T12:00:00");
        let estadoHoy = getValDiaGlobal(diasObj, fBase);
        if (esInactivo(estadoHoy)) {
            for (let i = 1; i <= 60; i++) {
                let fCheck = new Date(fBase); fCheck.setDate(fCheck.getDate() + i);
                if (!esInactivo(getValDiaGlobal(diasObj, fCheck))) return fCheck; 
            }
        } else {
            let fAyer = new Date(fBase); fAyer.setDate(fAyer.getDate() - 1);
            if (esInactivo(getValDiaGlobal(diasObj, fAyer))) return fBase; 
        }
        return null;
    }

    function generarEtiquetasPorcentaje(dataPoints, total) {
        let html = '';
        let currentAngle = 0; 
        dataPoints.forEach(dp => {
            let pct = (dp.val / total) * 100;
            if (pct > 5) { 
                let startAngle = currentAngle;
                let endAngle = currentAngle + (pct / 100) * 360;
                let middleAngle = startAngle + (endAngle - startAngle) / 2;
                let radians = (middleAngle - 90) * (Math.PI / 180);
                let radius = 35; 
                let x = Math.cos(radians) * radius;
                let y = Math.sin(radians) * radius;
                let textColorClass = dp.color === '#eab308' || dp.color === '#ffe599' ? 'text-gray-900' : 'text-white';
                html += `
                    <div class="absolute inset-0 flex items-center justify-center pointer-events-none drop-shadow-md">
                        <span class="text-[10px] font-black ${textColorClass} leading-none z-10 text-center" style="transform: translate(${x}px, ${y}px);">
                            ${pct.toFixed(0)}%
                        </span>
                    </div>
                `;
            }
            currentAngle += (pct / 100) * 360;
        });
        return html;
    }

async function cargarDatosDesdeCache() {
    mostrarCargando(true);
    
    try {
        // 👉 LE PEDIMOS TODO A NODE AL INSTANTE
        const resNode = await fetch('https://diagramasnode.onrender.com/api/datos').then(res => res.json());
        
        if (!resNode.success) {
            throw new Error(resNode.error || "El servidor aún está cargando la base de datos.");
        }

        const dataTDs = resNode.tds || { campo: {}, infinia: {}, liviano: {}, euro: {}, estados: {}, extra: {} };        const resDiagramas = typeof resNode.diagramas === 'string' ? JSON.parse(resNode.diagramas) : resNode.diagramas;

        window.tdGlobalData = {
            campo:   dataTDs.campo || {},
            infinia: dataTDs.infinia || {},
            liviano: dataTDs.liviano || {},
            euro:    dataTDs.euro || {},
            estados: dataTDs.estados || {},
            extra:   dataTDs.codigosExtra || {}
        };

        const normalize = (obj) => {
            if (!obj) return {};
            return Object.keys(obj).reduce((acc, k) => {
                const cleanKey = String(k).trim().toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/\s+/g, ' ');
                acc[cleanKey] = obj[k];
                return acc;
            }, {});
        };

        const map = {
            documentos:     v => docsGlobales = normalize(v),
            habilitaciones: v => habsGlobales = normalize(v),
            certificados:   v => certsGlobales = normalize(v),
            kilometros:     v => kmsGlobales = normalize(v),
            dnis:           v => dnisGlobales = normalize(v),
            telefonos:      v => telefonosGlobales = normalize(v),
            observaciones:  v => historialGlobal = normalize(v),
            aptosMedicos:   v => aptosGlobales = normalize(v),
            viajesCampo:    v => viajesGlobales = normalize(v),
            vencimientosObj: v => window.vencimientosCacheGlobal = v, 
            nuevaSeccionViajes: v => {
                if (v && typeof v === 'object' && !Array.isArray(v)) {
                    viajesDetalleGlobal = v;
                } else {
                    viajesDetalleGlobal = {};
                }
            },
            fotosImgur:     v => fotosGlobales = v || {}
        };

        Object.keys(map).forEach(key => { if(resDiagramas[key]) map[key](resDiagramas[key]) });

        datosGlobales = (resDiagramas.diagramas || [])
            .filter(c => {
                const name = String(c.nom || "").trim().toLowerCase();
                return name.length > 2 && !NOMBRES_IGNORADOS.has(name);
            })
            .map(c => ({ ...c, _safeId: crearSafeId(c.nom) }));

        filtrarTabla(); 
        mostrarCargando(false); 

    } catch (e) { 
        mostrarErrorGlobal("Error de sincronización con Node: " + e.message); 
        mostrarCargando(false); 
    }
}

            let datosDni = dnisGlobales[nKey];
            let dniString = datosDni ? String(datosDni.dni || datosDni).toLowerCase() : "";

            let matchText = nKey.includes(texto) || 
                            (c.tractor||'').toLowerCase().includes(texto) || 
                            (c.semi||'').toLowerCase().includes(texto) ||

            if (!matchText) return false;
            
            let srv = (c.srv || 'SIN ASIGNAR').toUpperCase().trim();

            if (vistaActual !== 'metricas') {
                let estadoDiaRaw = getValDiaGlobal(c.dias, fBaseObj);

window.mostrarDetalleConductor = function(safeId, mantenerSeleccion = false) {
    if (!mantenerSeleccion) { conductorSeleccionadoId = safeId; seleccionInicioIso = null; currentEndIso = null; }
    const contenedor = document.getElementById('contenedor-detalle-chofer');
    if (!safeId) { contenedor.innerHTML = ''; return; }
    
    const chofer = datosGlobales.find(c => String(c._safeId) === String(safeId));
    if (!chofer) return;

    let n = String(chofer.nom).trim().toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/\s+/g, ' ');

    let datosDni = dnisGlobales[n];
    let dniDelChofer = datosDni ? (datosDni.dni || datosDni) : null;

    let datosChoferObj = (dniDelChofer ? telefonosGlobales[dniDelChofer] : null) || telefonosGlobales[n] || {};

    dniDelChofer = datosChoferObj.dni || dniDelChofer || 'Sin DNI';
    let vacacionesAPI = datosDni && datosDni.vac !== undefined ? parseFloat(datosDni.vac) : 0;

    let legajoChofer = datosChoferObj.legajo || '-';
    let mailChofer = datosChoferObj.email || 'Sin Email';
    let altaChofer = datosChoferObj.fechaAlta || '-';
    
    let telChofer = datosChoferObj.telefono || (typeof telefonosGlobales[n] === 'string' ? telefonosGlobales[n] : null);
    let linkWspIndividual = '';
    let displayTel = 'Sin Teléfono';

window.manejarSeleccionCalendario = function(isoStr, event, safeId) {
    // Evita que el texto de la pantalla se seleccione accidentalmente al hacer Shift + Clic
    window.getSelection().removeAllRanges(); 
    
    if (!seleccionInicioIso || !event.shiftKey) { 
        // Si es un clic normal o el primer clic, selecciona solo ese día
        seleccionInicioIso = isoStr; 
        currentEndIso = isoStr; 
        pintarCeldas(isoStr, isoStr); 
        mostrarPanelAcciones(safeId, isoStr, isoStr); 
    } else { 
        // Si es Shift + Clic, calcula el inicio y fin correctos
        let d1 = new Date(seleccionInicioIso + "T12:00:00"); 
        let d2 = new Date(isoStr + "T12:00:00"); 
        let start = d1 <= d2 ? seleccionInicioIso : isoStr; 
        let end = d1 <= d2 ? isoStr : seleccionInicioIso; 
        
        currentEndIso = isoStr; 
        pintarCeldas(start, end); 
        mostrarPanelAcciones(safeId, start, end); 
    }
};

window.pintarCeldas = function(startIso, endIso) {
    let dStart = new Date(startIso + "T12:00:00"); 
    let dEnd = new Date(endIso + "T12:00:00");
    
    document.querySelectorAll('.celda-calendario').forEach(el => { 
        let cellDate = new Date(el.dataset.fecha + "T12:00:00"); 
        
        // Removemos clases previas de selección
        el.classList.remove('seleccionada', 'brightness-110'); 
        
        // Aplicamos el "halo" (ring) a las celdas que caen dentro del rango seleccionado
        if (cellDate >= dStart && cellDate <= dEnd) {
            el.classList.add('seleccionada');
            el.classList.add('brightness-110');
        }
    });
};

window.agregarNuevaHojaRuta = function(safeId, isoStr, contexto) {
    const inputEl = document.getElementById(`hr-new-input-${contexto}-${isoStr}`);
    if (!inputEl) return;
    let nuevoVal = inputEl.value.trim();
    if (!nuevoVal) return;

    const chofer = datosGlobales.find(c => String(c._safeId) === String(safeId));
    if(!chofer) return;

    let nLimpio = String(chofer.nom).trim().toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/\s+/g, ' ');
    
    // Inyectamos en memoria local (Agregando km:0 por defecto)
    if (!viajesDetalleGlobal[nLimpio]) viajesDetalleGlobal[nLimpio] = {};
    if (!viajesDetalleGlobal[nLimpio][isoStr]) viajesDetalleGlobal[nLimpio][isoStr] = { km:0, campo:0, liviano:0, euro:0, infiniaD:0, hoja_ruta: [] };
    
    let hrActuales = viajesDetalleGlobal[nLimpio][isoStr].hoja_ruta || [];
    if (!Array.isArray(hrActuales)) hrActuales = [];

    hrActuales = hrActuales.filter(h => String(h).trim() !== "");
    if (!hrActuales.includes(nuevoVal)) hrActuales.push(nuevoVal);
    
    viajesDetalleGlobal[nLimpio][isoStr].hoja_ruta = hrActuales;
    inputEl.value = '';
    ejecutarRenderLocalHR(safeId);
    enviarHRBackend(chofer, isoStr, hrActuales);
};

window.eliminarHojaDeRuta = function(safeId, isoStr, hrA_Borrar) {
    const chofer = datosGlobales.find(c => String(c._safeId) === String(safeId));
    if(!chofer) return;

    let nLimpio = String(chofer.nom).trim().toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/\s+/g, ' ');
    if (!viajesDetalleGlobal[nLimpio] || !viajesDetalleGlobal[nLimpio][isoStr]) return;
    
    let hrActuales = viajesDetalleGlobal[nLimpio][isoStr].hoja_ruta || [];
    
    // 1. Filtrar memoria
    hrActuales = hrActuales.filter(h => h !== hrA_Borrar && String(h).trim() !== "");
    viajesDetalleGlobal[nLimpio][isoStr].hoja_ruta = hrActuales;

    // 2. Renderizamos el panel activo
    ejecutarRenderLocalHR(safeId);

    // 3. Disparamos a la Nube
    enviarHRBackend(chofer, isoStr, hrActuales);
}

// Función centralizada para repintar la UI activa
function ejecutarRenderLocalHR(safeId) {
    if (vistaActual === 'individual') {
        mostrarDetalleConductor(safeId, true);
    } else if (seleccionInicioIso && currentEndIso) {
        let d1 = new Date(seleccionInicioIso + "T12:00:00"); 
        let d2 = new Date(currentEndIso + "T12:00:00"); 
        let start = d1 <= d2 ? seleccionInicioIso : currentEndIso; 
        let end = d1 <= d2 ? currentEndIso : seleccionInicioIso; 
        mostrarPanelAcciones(safeId, start, end);
    }
}

// Función de comunicación con Google Apps Script
function enviarHRBackend(chofer, isoStr, valoresHR) {
    const usuarioLogueado = localStorage.getItem('usuarioActivo') || "Sesión Perdida";

    fetch(API_URL, {
        method: 'POST',
        headers: { "Content-Type": "text/plain;charset=utf-8" },
        body: JSON.stringify({ 
            action: 'guardarHojaRutaPlanilla', 
            nombre: chofer.nom, 
            fecha: isoStr,
            hojas: valoresHR,
            usuario: usuarioLogueado,
            tractor: chofer.tractor 
        })
    }).then(r => r.json()).then(res => {
        if (!res.success) {
            showToast("Error al procesar la Hoja de Ruta en Servidor.", "error");
        } else {
            showToast("Planilla guardada correctamente.", "success");
        }
    }).catch(e => {
        showToast("Error de red guardando Hoja de Ruta", "error");
    });
}

window.guardarEstadoDesdeRango = function(safeId, startIso, endIso) {
        const est = document.getElementById(`quick-estado-${safeId}`).value;
        if (!est) return showToast("Por favor, seleccione un estado.", "error");

        const btn = document.getElementById('btn-quick-save');
        btn.innerHTML = `<span class="animate-spin inline-block w-4 h-4 border-2 border-indigo-900 border-t-transparent rounded-full"></span>`;
        btn.disabled = true;

        const chofer = datosGlobales.find(c => String(c._safeId) === String(safeId));

        let payloadEst = est;
        if (est === 'OPERATIVO') {
            let fStart = new Date(startIso + "T12:00:00");
            let fEnd = new Date(endIso + "T12:00:00");
            let fAyer = new Date(fStart);
            fAyer.setDate(fAyer.getDate() - 1);

            let valAyer = getBaseState(getValDiaGlobal(chofer.dias, fAyer));
            let numAyer = parseInt(valAyer, 10);
            let startNum = !isNaN(numAyer) ? numAyer + 1 : 1;

            if (startIso === endIso) {
                payloadEst = String(startNum);
            } else {
                payloadEst = [];
                let cur = new Date(fStart);
                let currentNum = startNum;
                while(cur <= fEnd) {
                    payloadEst.push(String(currentNum));
                    currentNum++;
                    cur.setDate(cur.getDate() + 1);
                }
            }
        }

        const usuarioLogueado = localStorage.getItem('usuarioActivo') || "Sesión Perdida";

        const payload = {
            action: 'actualizarEstado',
            nombre: chofer.nom,
            startIso: startIso,
            endIso: endIso,
            est: payloadEst,
            usuario: usuarioLogueado // 👉 FIRMA INYECTADA
        };

        fetch(API_URL, {
            method: 'POST',
            body: JSON.stringify(payload)
        })
        .then(res => res.json())
        .then(res => {
            if(res.success) { 
                showToast("Estado actualizado correctamente.", "success"); 
                document.getElementById('panel-acciones-rango').classList.add('hidden'); 
                document.querySelectorAll('.celda-calendario').forEach(el => el.classList.remove('ring-4', 'ring-indigo-400', 'ring-offset-1', 'scale-105', 'z-10')); 
                seleccionInicioIso = null; 
                currentEndIso = null;
            } else { 
                showToast(res.error || "Error al actualizar", "error"); 
                btn.innerHTML = 'Aplicar'; 
                btn.disabled = false; 
            }
        })
        .catch(err => {
            showToast("Error de conexión al guardar: " + err.message, "error");
            btn.innerHTML = 'Aplicar'; 
            btn.disabled = false; 
        });
    };

window.renderizarHistorialEventos = function(nombreChofer, startIso = null, endIso = null) {
        const contenedor = document.getElementById('contenedor-observaciones'); const badgeContador = document.getElementById('badge-contador-obs');
        if (!contenedor) return;
        const keyBuscador = String(nombreChofer).trim().toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/\s+/g, ' '); let historial = historialGlobal[keyBuscador] || [];
        let textoRango = "Todas las observaciones";

        if (startIso && endIso) {
            let dStart = new Date(startIso + "T12:00:00"); let dEnd = new Date(endIso + "T12:00:00");
            historial = historial.filter(ev => { let iso = parseFechaObs(ev.fecha); if (!iso) return false; let dEv = new Date(iso + "T12:00:00"); return dEv >= dStart && dEv <= dEnd; });
            textoRango = startIso === endIso ? `Del ${startIso.split('-').reverse().join('/')}` : `Del ${startIso.split('-').reverse().join('/')} al ${endIso.split('-').reverse().join('/')}`;
            if (historial.length > 0) { const wrap = document.getElementById('contenedor-observaciones-wrapper'); const icon = document.getElementById('icon-chevron-obs'); if (wrap && wrap.classList.contains('hidden')) { wrap.classList.remove('hidden'); wrap.classList.add('expand-anim'); icon.style.transform = 'rotate(180deg)'; } }
        }

        historial.sort((a, b) => {
            let dateA = parseFechaObs(a.fecha);
            let dateB = parseFechaObs(b.fecha);
            let timeA = dateA ? new Date(dateA + "T12:00:00").getTime() : 0;
            let timeB = dateB ? new Date(dateB + "T12:00:00").getTime() : 0;
            return timeB - timeA;
        });

function obtenerEstadisticasConDetalle() {
        const fBase = new Date(fechaGlobalContexto + "T12:00:00");
        let stats = {};
        
        window.datosMetricasGlobales = {
            TOTAL: [], ACTIVOS: [], F: [], FSF: [], V: [], VSF: [], IND: [], E: [], A: [], S: [], ART: [], INDEF: [],
            licVencidas: [], psicoVencidas: [], certVencidas: [], fatiga: []
        };

        datosGlobales.forEach(c => {
            let srv = (c.srv || 'SIN ASIGNAR').toUpperCase().trim();
            if (!SERVICIOS_PERMITIDOS.includes(srv)) return; 
            
            if(!stats[srv]) stats[srv] = { total: 0, ACTIVOS: 0, F: 0, FSF: 0, V: 0, VSF: 0, IND: 0, E: 0, A: 0, S: 0, ART: 0, INDEF: 0, licVencidas: 0, psicoVencidas: 0, certVencidas: 0, fatiga: 0 };
            stats[srv].total++;
            
            window.datosMetricasGlobales.TOTAL.push({_safeId: c._safeId, nom: c.nom, val: "Registrado", srv: srv});
            
            let n = c.nom.toLowerCase();
            let doc = docsGlobales[n] || {}; let hab = habsGlobales[n] || {}; let cert = certsGlobales[n] || {};
            let formatVen = (v) => v ? v.split('-').reverse().join('/') : 'S/D';

            let docEst = evaluarEstadoDoc(doc.ven, fBase);
            let habEst = evaluarEstadoDoc(hab.ven, fBase);
            let certEst = evaluarEstadoDoc(cert.ven, fBase);

            if (docEst === 'VENCIDO') { stats[srv].psicoVencidas++; window.datosMetricasGlobales.psicoVencidas.push({_safeId: c._safeId, nom: c.nom, val: "Venció: " + formatVen(doc.ven), srv: srv}); }
            if (habEst === 'VENCIDO') { stats[srv].licVencidas++; window.datosMetricasGlobales.licVencidas.push({_safeId: c._safeId, nom: c.nom, val: "Venció: " + formatVen(hab.ven), srv: srv}); }
            if (certEst === 'VENCIDO') { stats[srv].certVencidas++; window.datosMetricasGlobales.certVencidas.push({_safeId: c._safeId, nom: c.nom, val: "Venció: " + formatVen(cert.ven), srv: srv}); }

            let estadoDiaRaw = getValDiaGlobal(c.dias, fBase);
            let estadoDiaBase = getBaseState(estadoDiaRaw);

            if ((!isNaN(estadoDiaBase) && estadoDiaBase !== '') || estadoDiaBase === 'O' || estadoDiaBase === 'OPERATIVO') {
                stats[srv].ACTIVOS++;
                window.datosMetricasGlobales.ACTIVOS.push({_safeId: c._safeId, nom: c.nom, val: `Día ${estadoDiaRaw}`, srv: srv});
                
                let consecutivas = parseInt(estadoDiaBase, 10);
                if(isNaN(consecutivas)) consecutivas = 1;
                let limiteCrit = (c.diag && c.diag.includes('14')) ? 14 : 22;
                if (consecutivas >= limiteCrit) {
                    stats[srv].fatiga++;
                    window.datosMetricasGlobales.fatiga.push({_safeId: c._safeId, nom: c.nom, val: `${consecutivas} días act.`, srv: srv});
                }
            } else {
                if (estadoDiaBase === 'F') { stats[srv].F++; window.datosMetricasGlobales.F.push({_safeId: c._safeId, nom: c.nom, val: estadoDiaRaw, srv: srv}); }
                else if (estadoDiaBase === 'FSF') { stats[srv].FSF++; window.datosMetricasGlobales.FSF.push({_safeId: c._safeId, nom: c.nom, val: estadoDiaRaw, srv: srv}); }
                else if (estadoDiaBase === 'V') { stats[srv].V++; window.datosMetricasGlobales.V.push({_safeId: c._safeId, nom: c.nom, val: estadoDiaRaw, srv: srv}); }
                else if (estadoDiaBase === 'VSF') { stats[srv].VSF++; window.datosMetricasGlobales.VSF.push({_safeId: c._safeId, nom: c.nom, val: estadoDiaRaw, srv: srv}); }
                else if (estadoDiaBase === 'IND') { stats[srv].IND++; window.datosMetricasGlobales.IND.push({_safeId: c._safeId, nom: c.nom, val: estadoDiaRaw, srv: srv}); }
                else if (estadoDiaBase === 'E') { stats[srv].E++; window.datosMetricasGlobales.E.push({_safeId: c._safeId, nom: c.nom, val: estadoDiaRaw, srv: srv}); }
                else if (estadoDiaBase === 'A') { stats[srv].A++; window.datosMetricasGlobales.A.push({_safeId: c._safeId, nom: c.nom, val: estadoDiaRaw, srv: srv}); }
                else if (estadoDiaBase === 'S') { stats[srv].S++; window.datosMetricasGlobales.S.push({_safeId: c._safeId, nom: c.nom, val: estadoDiaRaw, srv: srv}); }
                else if (estadoDiaBase === 'ART') { stats[srv].ART++; window.datosMetricasGlobales.ART.push({_safeId: c._safeId, nom: c.nom, val: estadoDiaRaw, srv: srv}); }
                else if (estadoDiaBase === '?') { stats[srv].INDEF++; window.datosMetricasGlobales.INDEF.push({_safeId: c._safeId, nom: c.nom, val: estadoDiaRaw, srv: srv}); }
            }
        });
        return stats;
    }

window.mostrarDetalleMetrica = function(id, label, event, filterSrv = null, isAutoRefresh = false) {
    let rawData = window.datosMetricasGlobales[id] || [];
    let data = filterSrv ? rawData.filter(item => item.srv === filterSrv) : rawData;

    const panel = document.getElementById('panel-detalle-metrica');
    
    // [UX] Guardar el estado si es una interacción humana
    if (!isAutoRefresh) {
        window.metricaActivaState = { id, label, filterSrv };
        
        document.querySelectorAll('.metrica-cell').forEach(cell => { 
            cell.classList.remove('ring-inset', 'ring-4'); 
        });
        
        if (event && event.currentTarget) {
            event.currentTarget.classList.add('ring-inset', 'ring-4');
            // Guardamos el índice exacto de la celda para re-aplicar el borde tras el auto-refresh
            window.metricaActivaState.cellIndex = Array.from(document.querySelectorAll('.metrica-cell')).indexOf(event.currentTarget);
        }
    }

    let filterNotice = filterSrv ? `<span class="bg-blue-100 text-blue-800 border border-blue-200 px-2 py-0.5 rounded text-xs font-bold">Filtro: ${filterSrv}</span>` : '';

    // [UX] El botón de cierre ahora limpia la memoria (metricaActivaState = null)
    let html = `
        <div class="flex justify-between items-center mb-4 border-b border-gray-200 pb-3">
            <div class="flex items-center gap-2 flex-wrap">
                <h4 class="font-black text-indigo-900 text-sm md:text-base uppercase tracking-wider flex items-center gap-2">
                    Detalle: ${label} 
                </h4>
                ${filterNotice}

            <button onclick="document.getElementById('panel-detalle-metrica').classList.add('hidden'); document.querySelectorAll('.metrica-cell').forEach(c=>c.classList.remove('ring-inset', 'ring-4')); window.metricaActivaState = null;" class="text-gray-400 hover:text-red-500 bg-gray-100 p-1.5 rounded-lg transition-colors">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>
        </div>`;
    
    if(data.length === 0) {
        html += `<div class="text-center py-6 text-gray-500 font-bold text-xs uppercase tracking-widest bg-white rounded-lg border border-dashed border-gray-300">Sin conductores en este estado.</div>`;
    } else {
        html += `<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3 max-h-[350px] overflow-y-auto custom-scrollbar pr-2">`;
        
        data.sort((a,b) => a.nom.localeCompare(b.nom)).forEach(item => {
           let th = getSrvTheme(item.srv);
            html += `
            <div onclick="irAVistaIndividual('${item._safeId}')" class="flex flex-col p-3 bg-white border border-gray-200 rounded-xl shadow-sm hover:border-blue-400 hover:shadow-md hover:bg-blue-50/30 transition-all cursor-pointer group" title="Ir a ficha individual de ${item.nom}">
                <div class="flex justify-between items-center w-full mb-2">
                    <span class="font-bold text-gray-800 text-xs sm:text-sm truncate pr-2 group-hover:text-blue-700 transition-colors">
                        ${item.nom}
                    </span>
                    <svg class="w-3.5 h-3.5 shrink-0 opacity-0 group-hover:opacity-100 transition-opacity text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                </div>
                <div class="flex items-center gap-2">
                    <span class="${th.softBg} ${th.softText} border ${th.border} px-1.5 py-0.5 rounded text-[9px] font-bold uppercase tracking-wider shrink-0">
                        ${item.srv}
                    </span>
                    <span class="text-[10px] font-black px-2 py-0.5 bg-gray-100 text-gray-700 border border-gray-200 rounded-md truncate group-hover:bg-blue-100 group-hover:text-blue-800 group-hover:border-blue-300 transition-colors">
                        ${item.val}
                    </span>
                </div>
            </div>`;
        });
        html += `</div>`;
    }
    
    panel.innerHTML = html;
    panel.classList.remove('hidden');
    
    // [UX] Aplicar animaciones y auto-scroll SOLO si fue un clic humano
    if (!isAutoRefresh) {
        panel.classList.add('expand-anim');
        setTimeout(() => {
            panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }, 100);
    } else {
        // Si fue el Auto-Refresh, re-pintamos el anillo (halo) en la celda activa para no perder el rastro visual
        if (window.metricaActivaState && window.metricaActivaState.cellIndex !== undefined) {
            const cells = document.querySelectorAll('.metrica-cell');
            if (cells[window.metricaActivaState.cellIndex]) {
                cells[window.metricaActivaState.cellIndex].classList.add('ring-inset', 'ring-4');
            }
        }
    }

        const safeId = document.getElementById('editor-legajo').value;

        const fInicio = document.getElementById('editor-fecha-inicio').value;
        const fFin = document.getElementById('editor-fecha-fin').value;
        const est = document.getElementById('editor-estado').value;

        if (!fInicio || !fFin || !est) return showToast("Complete todos los campos.", "error");

        const btn = document.getElementById('btn-guardar');
        const originalText = btn.innerHTML;
        btn.innerHTML = `<span class="animate-spin inline-block w-4 h-4 border-2 border-white border-t-transparent rounded-full"></span>`;
        btn.disabled = true;

        // --- NUEVA LÓGICA DE SECUENCIA INTELIGENTE ---
        let payloadEst = est;
        if (est === 'OPERATIVO') {
            let fStart = new Date(fInicio + "T12:00:00");
            let fEnd = new Date(fFin + "T12:00:00");
            
            // Buscar el día inmediatamente anterior
            let fAyer = new Date(fStart);
            fAyer.setDate(fAyer.getDate() - 1);
            let valAyer = getBaseState(getValDiaGlobal(chofer.dias, fAyer));
            
            // Si ayer era un número, lo sumamos. Si era F, V, etc, empezamos en 1.
            let numAyer = parseInt(valAyer, 10);
            let startNum = !isNaN(numAyer) ? numAyer + 1 : 1;

            if (fInicio === fFin) {
                // Si seleccionó un solo día, enviamos el número en texto (Ej: "5")
                payloadEst = String(startNum);
            } else {
                // Si es un rango (ej: 3 días), enviamos un arreglo (Ej: ["5", "6", "7"])
                payloadEst = [];
                let cur = new Date(fStart);
                let currentNum = startNum;
                while(cur <= fEnd) {
                    payloadEst.push(String(currentNum));
                    currentNum++;
                    cur.setDate(cur.getDate() + 1);
                }
            }
        }
        // ---------------------------------------------

// 👉 NUEVO: Recuperamos la identidad
        const usuarioLogueado = localStorage.getItem('usuarioActivo') || "Sesión Perdida";

        const payload = {
            action: 'actualizarEstado', // Coincide con el doPost
            nombre: chofer.nom,         // Variable correcta del objeto chofer
            startIso: fInicio,          // Usa la variable fInicio definida arriba
            endIso: fFin,               // Usa la variable fFin definida arriba
            est: payloadEst,            // Usa la secuencia calculada (payloadEst)
            usuario: usuarioLogueado    // 👉 NUEVO: Inyectamos la firma
        };

        fetch(API_URL, {
            method: 'POST',
            body: JSON.stringify(payload)
        })
        .then(res => res.json())
        .then(res => {
            if(res.success) {
                showToast("Estado actualizado correctamente.", "success");
                cerrarEditor();
                setTimeout(cargarDatosDesdeCache, 500); 
            } else {
                showToast(res.error || "Error al actualizar", "error");
            }
        })
        .catch(err => showToast("Error de conexión: " + err.message, "error"))
        .finally(() => {
            btn.innerHTML = originalText;
            btn.disabled = false;
        });
    };

            const normalize = (obj) => {
                if (!obj) return {};
                return Object.keys(obj).reduce((acc, k) => {
                    const cleanKey = String(k).trim().toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/\s+/g, ' ');
                    acc[cleanKey] = obj[k];
                    return acc;
                }, {});

            docsGlobales = normalize(dataDiag.documentos);

            }, 150); 

        } catch (e) { 
            console.warn("Error procesando sockets:", e);
        }
    });
  </script>
